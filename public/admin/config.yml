publish_mode: editorial_workflow

backend:
  name: github
  branch: main
  repo: gongoracastillolab/gongoracastillolab.github.io
  base_url: https://decap-auth-gclab.gongoracastillolab.workers.dev
  auth_endpoint: auth
  squash_merges: true

local_backend: true

media_folder: "public"
public_folder: "/"

logo:
  src: "/logo_GClab.png"
  show_in_header: true

site_url: "https://gongoracastillolab.github.io"
display_url: "https://gongoracastillolab.github.io"

# i18n: ES y EN en la misma pantalla (un archivo por contenido, claves es/en).
i18n:
  structure: single_file
  locales: [es, en]
  default_locale: es

collections:
  # ─── Inicio ─────────────────────────────────────────────────────────────────
  - name: "inicio"
    label: "Inicio"
    description: "Portada, descripción y contacto. Edita español e inglés en la misma pantalla."
    i18n:
      structure: single_file
      locales: [es, en]
      default_locale: es
    files:
      - name: "inicio"
        label: "Inicio (ES + EN)"
        file: "src/data/page_home.json"
        i18n: true
        fields:
          - { label: "Título Principal (Portada)", name: "title", widget: "string", i18n: true }
          - { label: "Subtítulo / Tagline (Portada)", name: "heroTagline", widget: "string", i18n: true }
          - { label: "Descripción", name: "description", widget: "text", i18n: true, hint: "Un párrafo por línea. Línea en blanco entre párrafos." }
          - { label: "Texto de Contacto", name: "contactText", widget: "text", i18n: true }
          - { label: "Email de Contacto", name: "contactEmail", widget: "string", i18n: true }

  # ─── Investigación ──────────────────────────────────────────────────────────
  - name: "investigacion"
    label: "Investigación"
    description: "Historia del lab y proyectos. ES y EN en la misma pantalla."
    i18n:
      structure: single_file
      locales: [es, en]
      default_locale: es
    files:
      - name: "historia"
        label: "Historia del laboratorio (ES + EN)"
        file: "src/data/page_research.json"
        i18n: true
        fields:
          - { label: "Imagen de Portada", name: "heroImage", widget: "image", required: false, i18n: true }
          - { label: "Título de Historia", name: "historyTitle", widget: "string", i18n: true }
          - { label: "Contenido narrativo", name: "historyContent", widget: "text", i18n: true }
      - name: "proyectos"
        label: "Proyectos vigentes (ES + EN)"
        file: "src/data/projects.json"
        i18n: true
        fields:
          - label: "Lista de Proyectos"
            name: "projects"
            widget: "list"
            i18n: true
            fields:
              - { label: "ID (único, ej. papaya)", name: "id", widget: "string" }
              - { label: "Título", name: "title", widget: "string" }
              - label: "Estado"
                name: "status"
                widget: "select"
                default: "active"
                options:
                  - { label: "Activo", value: "active" }
                  - { label: "Nuevo", value: "new" }
                  - { label: "Cerrado", value: "closed" }
              - { label: "Descripción", name: "description", widget: "text" }
              - { label: "Etiquetas", name: "tags", widget: "list" }
              - { label: "Imagen", name: "image", widget: "image", required: false }

  # ─── Equipo (contenido único: misma info en ES y EN) ─────────────────────────
  - name: "equipo_single"
    label: "Equipo"
    description: "Portada de la página, miembros, personal técnico, colaboradores, egresados y fotos de grupo. Una sola versión (se usa en ambos idiomas)."
    files:
      - name: "pagina_equipo"
        label: "Página Equipo — Portada"
        file: "src/data/page_people.json"
        fields:
          - { label: "Imagen de Portada", name: "heroImage", widget: "image", required: false }
      - label: "Miembros activos"
        name: "miembros"
        file: "src/data/members.json"
        fields:
          - label: "Integrantes"
            name: "members"
            widget: "list"
            fields:
              - { label: "Nombre", name: "name", widget: "string" }
              - label: "Rol"
                name: "roleKey"
                widget: "select"
                options:
                  - { label: "Posdoctorado", value: "people.alumni.roles.postdoc" }
                  - { label: "Doctorado", value: "people.alumni.roles.phd" }
                  - { label: "Maestría", value: "people.alumni.roles.ms" }
                  - { label: "Personal Técnico", value: "people.alumni.roles.technical" }
              - { label: "Departamento o Unidad", name: "department", widget: "string", required: false }
              - { label: "Institución", name: "institution", widget: "string", required: false }
              - { label: "Email", name: "email", widget: "string", required: false }
              - { label: "Imagen", name: "image", widget: "image", required: false }
      - label: "Personal técnico y colaboradores"
        name: "staff_colaboradores"
        file: "src/data/staff_collaborators.json"
        fields:
          - label: "Personal Técnico"
            name: "technicalStaff"
            widget: "list"
            fields:
              - { label: "Nombre", name: "name", widget: "string" }
              - label: "Rol"
                name: "roleKey"
                widget: "select"
                options:
                  - { label: "Técnico", value: "people.alumni.roles.technical" }
                  - { label: "PI Asociado", value: "people.alumni.roles.pi" }
              - { label: "Imagen", name: "image", widget: "image", required: false }
          - label: "Instituciones colaboradoras (logos)"
            name: "collaborators"
            widget: "list"
            fields:
              - { label: "Logo", name: "logo", widget: "image" }
              - { label: "Nombre de la institución", name: "name", widget: "string" }
      - label: "Egresados"
        name: "egresados"
        file: "src/data/alumni.json"
        fields:
          - label: "Posgrado"
            name: "graduated"
            widget: "object"
            fields:
              - { label: "Posdoctorado", name: "postdoc", widget: "list", fields: [{ label: "Año", name: "year", widget: "string" }, { label: "Nombre", name: "name", widget: "string" }] }
              - { label: "Doctorado", name: "phd", widget: "list", fields: [{ label: "Año", name: "year", widget: "string" }, { label: "Nombre", name: "name", widget: "string" }] }
              - { label: "Maestría", name: "ms", widget: "list", fields: [{ label: "Año", name: "year", widget: "string" }, { label: "Nombre", name: "name", widget: "string" }] }
          - label: "Licenciatura y estancias"
            name: "undergraduate"
            widget: "list"
            fields:
              - { label: "Año", name: "year", widget: "string" }
              - { label: "Nombre", name: "name", widget: "string" }
              - { label: "Institución", name: "inst", widget: "string" }
      - label: "Fotos de grupo"
        name: "fotos_grupo"
        file: "src/data/group_photos.json"
        fields:
          - label: "Fotos anuales"
            name: "groupPhotos"
            widget: "list"
            fields:
              - { label: "Año", name: "year", widget: "string" }
              - { label: "Imagen", name: "image", widget: "image" }

  # ─── Equipo — PI (bilingüe ES + EN) ─────────────────────────────────────────
  - name: "equipo"
    label: "Investigadora Principal"
    description: "Datos de la Investigadora Principal. Edita español e inglés en la misma pantalla."
    i18n:
      structure: single_file
      locales: [es, en]
      default_locale: es
    files:
      - name: "pi"
        label: "Investigadora Principal — PI (ES + EN)"
        file: "src/data/pi_info.json"
        i18n: true
        fields:
          - { label: "Nombre Completo", name: "name", widget: "string", i18n: true }
          - { label: "Cargo / Posición", name: "position", widget: "string", i18n: true }
          - { label: "Institución", name: "institution", widget: "string", i18n: true }
          - { label: "Email", name: "email", widget: "string", i18n: true }
          - { label: "ORCID (URL)", name: "orcidUrl", widget: "string", required: false, i18n: true }
          - { label: "ResearchGate (URL)", name: "researchGateUrl", widget: "string", required: false, i18n: true }
          - { label: "Biografía", name: "bio", widget: "text", i18n: true }
          - label: "Formación Académica"
            name: "education"
            widget: "list"
            i18n: true
            fields:
              - { label: "Año", name: "year", widget: "string" }
              - { label: "Descripción", name: "text", widget: "string" }

  # ─── Divulgación ────────────────────────────────────────────────────────────
  - name: "divulgacion"
    label: "Divulgación"
    description: "Podcasts, videos, eventos y artículos. ES y EN en la misma pantalla. Imagen y galería: sube solo en la columna ESPAÑOL; la web usa esa misma imagen también en inglés. En el panel inglés del admin no se verá la miniatura (limitación de Decap en listas), pero en la página pública sí. Opcional: en inglés puedes pegar la misma URL de imagen (Insert from URL) para ver la miniatura también ahí."
    i18n:
      structure: single_file
      locales: [es, en]
      default_locale: es
    files:
      - name: "divulgacion"
        label: "Divulgación (ES + EN)"
        file: "src/data/outreach.json"
        i18n: true
        fields:
          - label: "Items"
            name: "items"
            widget: "list"
            i18n: true
            fields:
              - { label: "ID", name: "id", widget: "string" }
              - { label: "Tipo", name: "type", widget: "select", options: ["podcast", "video", "event", "article"] }
              - { label: "Título", name: "title", widget: "string" }
              - { label: "Descripción", name: "description", widget: "text" }
              - { label: "Fecha", name: "eventDate", widget: "string", required: false, hint: "Formato YYYY-MM-DD (ej. 2023-11-09)" }
              - { label: "URL principal", name: "url", widget: "string", required: false }
              - { label: "URLs adicionales", name: "urls", widget: "list", required: false }
              - { label: "Imagen", name: "image", widget: "image", required: false, hint: "Subir en la columna Español; la web la reutiliza en inglés." }
              - label: "Galería de fotos (eventos)"
                name: "images"
                widget: "list"
                required: false
                hint: "Añadir fotos en la columna Español; la web las reutiliza en inglés."
                fields:
                  - { label: "Foto", name: "src", widget: "image" }
                  - { label: "Subtítulo", name: "caption", widget: "string", required: false }

  # ─── Configuración ──────────────────────────────────────────────────────────
  # Textos de interfaz (menú, botones, etiquetas, mensajes, Red de citaciones). El campo «translation» es JSON en formato texto; la app lo parsea. Editar con cuidado.
  - name: "config"
    label: "Configuración"
    description: "Traducciones de la interfaz: menú, botones, etiquetas, mensajes y página Red de citaciones. Aquí se edita el JSON completo; debe ser JSON válido."
    files:
      - label: "Traducciones (ES)"
        name: "traducciones_es"
        file: "src/i18n/locales/es/translation.json"
        fields:
          - { label: "JSON (ES)", name: "translation", widget: "code", default_language: "json", output_code_only: true, hint: "Objeto JSON con claves nav, home, research, people, publications, outreach, publicationsNetwork, footer, etc. Sin comillas exteriores." }
      - label: "Traducciones (EN)"
        name: "traducciones_en"
        file: "src/i18n/locales/en/translation.json"
        fields:
          - { label: "JSON (EN)", name: "translation", widget: "code", default_language: "json", output_code_only: true, hint: "Objeto JSON con las mismas claves que en ES. Debe ser JSON válido." }
